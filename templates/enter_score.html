{% extends "base.html" %}
{% block title %}Enter Score{% endblock %}
{% block content %}
  <h1>Enter Score</h1>
  <form method="POST">
    <label for="score1">Enter {{ match[1] }}'s Score:</label>
    <input type="number" name="score1" required>

    <label for="score2">Enter {{ match[2] }}'s Score:</label>
    <input type="number" name="score2" required>

    <button type="submit">Submit</button>
  </form>
{% endblock %}
