{% extends "base.html" %}
{% block title %}Leaderboard{% endblock %}
{% block content %}
  <h1>Leaderboard</h1>
  <table>
    <tr><th>Player</th><th>Wins</th><th>Games Played</th></tr>
    {% for player in leaderboard %}
    <tr>
      <td>{{ player[0] }}</td>
      <td>{{ player[1] }}</td>
      <td>{{ player[2] }}</td>
    </tr>
    {% endfor %}
  </table>
{% endblock %}
