{% extends "base.html" %}
{% block title %}Upload Matches{% endblock %}

{% block content %}
  <h1>Bulk Upload Matches</h1>
  <p>CSV format: <code>player1,player2,scheduled_at</code> (e.g. "Alice A,Bob B,2025-08-01 18:00:00")</p>

  <form method="post" enctype="multipart/form-data">
    <input type="file" name="csv_file" accept=".csv" required>
    <button type="submit">Upload CSV</button>
  </form>

  <a href="{{ url_for('admin.new_match') }}">Back to Schedule Match</a>
{% endblock %}
