name: CI Pipeline

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  function-unit-tests:
    name: Function Unit Tests
    runs-on: self-hosted
    timeout-minutes: 5
    strategy:
      matrix:
        function: [league-api, save-push-token, delete-account, leaderboard]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: appwrite/functions/${{ matrix.function }}
        run: npm install
      - name: Run tests
        working-directory: appwrite/functions/${{ matrix.function }}
        run: npx jest --passWithNoTests

  e2e-tests:
    name: E2E Smoke Tests
    runs-on: self-hosted
    timeout-minutes: 10
    environment: APPWRITE_API_KEY
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: mobile
        run: npm ci --ignore-scripts --legacy-peer-deps
      - name: Run E2E smoke tests
        working-directory: mobile
        run: npm run test:e2e
        env:
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}

  secret-detection:
    name: Secret Detection (Gitleaks)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          mkdir -p "$HOME/.local/bin"
          # Remove any stale/wrong-arch binary
          rm -f "$HOME/.local/bin/gitleaks"
          TMPDIR=$(mktemp -d)
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.0/gitleaks_8.21.0_linux_x64.tar.gz -o "$TMPDIR/gitleaks.tar.gz"
          tar xzf "$TMPDIR/gitleaks.tar.gz" -C "$TMPDIR"
          mv "$TMPDIR/gitleaks" "$HOME/.local/bin/gitleaks"
          chmod +x "$HOME/.local/bin/gitleaks"
          rm -rf "$TMPDIR"
          export PATH="$HOME/.local/bin:$PATH"
          file "$HOME/.local/bin/gitleaks"
          gitleaks version
      - name: Run Gitleaks
        run: gitleaks detect --source . -v --config .gitleaks.toml

  dependency-scan:
    name: Dependency Scan
    runs-on: self-hosted
    strategy:
      matrix:
        directory: [mobile, appwrite/functions/save-push-token, appwrite/functions/send-push, appwrite/functions/league-api, appwrite/functions/delete-account, appwrite/functions/leaderboard, "."]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run npm audit
        working-directory: ${{ matrix.directory }}
        run: |
          if [ -f package-lock.json ]; then
            npm audit --audit-level=high || true
          elif [ -f package.json ]; then
            npm install --package-lock-only 2>/dev/null && npm audit --audit-level=high || true
          fi

  sast-javascript:
    name: SAST - JavaScript (Semgrep)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python and install Semgrep
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH="$HOME/.local/bin:$PATH"
          echo "Python version: $(python3 --version 2>&1 || echo 'not found')"
          echo "Pip version: $(python3 -m pip --version 2>&1 || echo 'not found')"
          python3 -m pip install --user --break-system-packages semgrep 2>/dev/null \
            || python3 -m pip install --user semgrep 2>/dev/null \
            || pip3 install --user semgrep
          semgrep --version
      - name: Run Semgrep
        run: |
          semgrep scan \
            --config .semgreprc.yml \
            --error \
            --severity ERROR \
            --exclude='node_modules' \
            --exclude='*.lock' \
            --exclude='.expo'

  sast-python:
    name: SAST - Python (Bandit)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python and install Bandit
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH="$HOME/.local/bin:$PATH"
          python3 -m pip install --user --break-system-packages bandit 2>/dev/null \
            || python3 -m pip install --user bandit 2>/dev/null \
            || pip3 install --user bandit
          bandit --version
      - name: Run Bandit
        run: |
          if find migrations/ -name '*.py' 2>/dev/null | head -1 | grep -q .; then
            bandit -r migrations/ -f json -o bandit-report.json || true
            bandit -r migrations/ -ll
          else
            echo "No Python files found in migrations/"
          fi

  config-scan:
    name: Config & Filesystem Scan (Trivy)
    runs-on: self-hosted
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          format: table

  license-check:
    name: License Compliance Check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install license-checker
        run: npm install -g license-checker
      - name: Check licenses
        run: |
          for dir in mobile; do
            if [ -f "$dir/package.json" ]; then
              echo "Checking licenses in $dir/"
              cd "$dir"
              npm install --ignore-scripts 2>/dev/null || true
              license-checker --failOn 'GPL-3.0;AGPL-3.0' --production || exit 1
              cd ..
            fi
          done

  pipeline-summary:
    name: Pipeline Summary
    runs-on: self-hosted
    if: always()
    needs:
      - function-unit-tests
      - e2e-tests
      - secret-detection
      - dependency-scan
      - sast-javascript
      - sast-python
      - config-scan
      - license-check
    steps:
      - name: Summary
        run: |
          echo "## Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Function Unit Tests | ${{ needs.function-unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Smoke Tests | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Detection | ${{ needs.secret-detection.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan | ${{ needs.dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST JavaScript | ${{ needs.sast-javascript.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST Python | ${{ needs.sast-python.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Config Scan | ${{ needs.config-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| License Check | ${{ needs.license-check.result }} |" >> $GITHUB_STEP_SUMMARY
      - name: Fail on critical
        if: |
          needs.function-unit-tests.result == 'failure' ||
          needs.e2e-tests.result == 'failure' ||
          needs.secret-detection.result == 'failure' ||
          needs.license-check.result == 'failure'
        run: |
          echo "::error::Critical job(s) failed — E2E, secret detection, or license check."
          exit 1
