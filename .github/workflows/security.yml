name: Security Scanning

on:
  push:
    branches: [new, dev]
  pull_request:
    branches: [new, dev]

permissions:
  contents: read
  security-events: write

jobs:
  secret-detection:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory:
          - mobile
          - appwrite/functions/save-push-token
          - appwrite/functions/send-push
          - web
          - "."
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run npm audit
        working-directory: ${{ matrix.directory }}
        run: |
          if [ -f package-lock.json ]; then
            npm audit --audit-level=high || true
          elif [ -f package.json ]; then
            npm install --package-lock-only 2>/dev/null && npm audit --audit-level=high || true
          fi
      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v1
        continue-on-error: true
        with:
          scan-args: |-
            --recursive
            --skip-git
            ${{ matrix.directory }}

  sast-javascript:
    name: SAST - JavaScript (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/javascript \
            --config p/nodejs \
            --config p/owasp-top-ten \
            --config .semgreprc.yml \
            --error \
            --exclude='node_modules' \
            --exclude='*.lock' \
            --exclude='.expo'

  sast-python:
    name: SAST - Python (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit
        run: |
          if find migrations/ -name '*.py' 2>/dev/null | head -1 | grep -q .; then
            bandit -r migrations/ -f json -o bandit-report.json || true
            bandit -r migrations/ -ll
          else
            echo "No Python files found in migrations/"
          fi

  config-scan:
    name: Config & Filesystem Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          format: table

  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install license-checker
        run: npm install -g license-checker
      - name: Check licenses
        run: |
          for dir in mobile web; do
            if [ -f "$dir/package.json" ]; then
              echo "Checking licenses in $dir/"
              cd "$dir"
              npm install --ignore-scripts 2>/dev/null || true
              license-checker --failOn 'GPL-3.0;AGPL-3.0' --production || exit 1
              cd ..
            fi
          done
