name: Security Scanning

on:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:
  secret-detection:
    name: Secret Detection (Gitleaks)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          if ! command -v gitleaks &> /dev/null; then
            TMPDIR=$(mktemp -d)
            curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.0/gitleaks_8.21.0_darwin_x64.tar.gz -o "$TMPDIR/gitleaks.tar.gz"
            tar xzf "$TMPDIR/gitleaks.tar.gz" -C "$TMPDIR"
            sudo mv "$TMPDIR/gitleaks" /usr/local/bin/gitleaks
            chmod +x /usr/local/bin/gitleaks
            rm -rf "$TMPDIR"
          fi
          gitleaks version
      - name: Run Gitleaks
        run: gitleaks detect --source . -v --config .gitleaks.toml

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: self-hosted
    strategy:
      matrix:
        directory:
          - mobile
          - appwrite/functions/save-push-token
          - appwrite/functions/send-push
          - web
          - "."
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run npm audit
        working-directory: ${{ matrix.directory }}
        run: |
          if [ -f package-lock.json ]; then
            npm audit --audit-level=high || true
          elif [ -f package.json ]; then
            npm install --package-lock-only 2>/dev/null && npm audit --audit-level=high || true
          fi
      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v1
        continue-on-error: true
        with:
          scan-args: |-
            --recursive
            --skip-git
            ${{ matrix.directory }}

  sast-javascript:
    name: SAST - JavaScript (Semgrep)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Install Semgrep
        run: |
          if ! command -v semgrep &> /dev/null; then
            python3.10 -m pip install --break-system-packages semgrep 2>/dev/null \
              || python3.10 -m pip install semgrep 2>/dev/null \
              || python3 -m pip install semgrep
          fi
          semgrep --version
      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/javascript \
            --config p/nodejs \
            --config p/owasp-top-ten \
            --config .semgreprc.yml \
            --error \
            --exclude='node_modules' \
            --exclude='*.lock' \
            --exclude='.expo'

  sast-python:
    name: SAST - Python (Bandit)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Install Bandit
        run: |
          python3.10 -m pip install --break-system-packages bandit 2>/dev/null \
            || python3.10 -m pip install bandit 2>/dev/null \
            || python3 -m pip install bandit
      - name: Run Bandit
        run: |
          if find migrations/ -name '*.py' 2>/dev/null | head -1 | grep -q .; then
            bandit -r migrations/ -f json -o bandit-report.json || true
            bandit -r migrations/ -ll
          else
            echo "No Python files found in migrations/"
          fi

  config-scan:
    name: Config & Filesystem Scan (Trivy)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          format: table

  license-check:
    name: License Compliance Check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install license-checker
        run: npm install -g license-checker
      - name: Check licenses
        run: |
          for dir in mobile web; do
            if [ -f "$dir/package.json" ]; then
              echo "Checking licenses in $dir/"
              cd "$dir"
              npm install --ignore-scripts 2>/dev/null || true
              license-checker --failOn 'GPL-3.0;AGPL-3.0' --production || exit 1
              cd ..
            fi
          done
